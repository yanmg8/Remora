name: Package macOS App

on:
  push:
    tags:
      # ci-test tags exercise packaging without creating a GitHub Release.
      - "v*"
      - "ci-test-*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            label: apple-silicon
          - runner: macos-15-intel
            arch: x86_64
            label: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show macOS SDK version
        run: xcrun --sdk macosx --show-sdk-version

      - name: Show Swift version
        run: swift --version

      - name: Verify tag commit is on main
        id: ref_guard
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "tag_on_main=true" >> "$GITHUB_OUTPUT"
            echo "Tag commit is on main."
          else
            echo "tag_on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not on main. Skip packaging for this tag."
          fi

      - name: Package Remora.app
        if: steps.ref_guard.outputs.tag_on_main == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev-${GITHUB_SHA::7}}"
          chmod +x scripts/package_macos.sh
          scripts/package_macos.sh \
            --arch "${{ matrix.arch }}" \
            --version "${VERSION#v}" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir dist \
            --zip-name "Remora-${VERSION}-macos-${{ matrix.label }}.zip"

      - name: Upload build artifact
        if: steps.ref_guard.outputs.tag_on_main == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: remora-${{ matrix.label }}
          path: |
            dist/Remora-*.zip
            dist/Remora-*.zip.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag commit is on main
        id: ref_guard
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "tag_on_main=true" >> "$GITHUB_OUTPUT"
            echo "Tag commit is on main."
          else
            echo "tag_on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not on main. Skip release publish."
          fi

      - name: Download all build artifacts
        if: steps.ref_guard.outputs.tag_on_main == 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build release notes from changelog
        if: steps.ref_guard.outputs.tag_on_main == 'true'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/extract_release_notes.sh
          scripts/extract_release_notes.sh "${GITHUB_REF_NAME}" CHANGELOG.md > RELEASE_NOTES.md

      - name: Attach assets to GitHub release
        if: steps.ref_guard.outputs.tag_on_main == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/Remora-*.zip
            dist/Remora-*.zip.sha256
