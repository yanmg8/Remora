name: UI Automation

on:
  workflow_dispatch:

jobs:
  ui-automation:
    name: Run UI automation tests
    runs-on:
      - self-hosted
      - macOS
    env:
      REMORA_RUN_UI_TESTS: "1"
      REMORA_APP_BINARY: .build/debug/RemoraApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Build RemoraApp for UI automation
        run: swift build --product RemoraApp

      - name: Run UI automation suite
        run: swift test --filter RemoraUIAutomationTests

      - name: Runner requirements
        if: always()
        run: |
          echo "This workflow expects a self-hosted macOS runner with Accessibility access enabled for the Actions runner process."
